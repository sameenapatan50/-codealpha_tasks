<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoFi Vibes | Music Player</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- Loading Screen -->
    <div class="loader" id="loader">
        <div class="loader-content">
            <div class="loader-icon">
                <i class="fas fa-music"></i>
            </div>
            <h2>LoFi Vibes</h2>
            <p>Loading your music...</p>
            <div class="loader-bar">
                <div class="loader-fill"></div>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast">
        <i class="fas fa-check-circle"></i>
        <span id="toastMsg"></span>
    </div>

    <!-- Background -->
    <div class="bg-animation">
        <div class="blob blob1"></div>
        <div class="blob blob2"></div>
        <div class="blob blob3"></div>
        <div class="blob blob4"></div>
    </div>

    <!-- Main App -->
    <div class="app" id="app">

        <!-- Header -->
        <div class="header">
            <div class="header-left">
                <i class="fas fa-music"></i>
                <span>LoFi Vibes</span>
            </div>
            <div class="header-right">
                <button class="icon-btn" id="themeToggle" title="Toggle Theme">
                    <i class="fas fa-moon"></i>
                </button>
            </div>
        </div>

        <!-- Player Section -->
        <div class="player-section">

            <!-- Music Player Card -->
            <div class="player-card">

                <!-- Album Art -->
                <div class="album-container">
                    <div class="album-ring ring-outer"></div>
                    <div class="album-ring ring-inner"></div>
                    <div class="album-art" id="albumArt">
                        <img src="" id="albumImg" alt="Album Art">
                        <div class="album-overlay">
                            <i class="fas fa-music"></i>
                        </div>
                    </div>
                    <button class="favorite-btn" id="favoriteBtn" title="Add to Favorites">
                        <i class="far fa-heart"></i>
                    </button>
                </div>

                <!-- Song Info -->
                <div class="song-info">
                    <h2 class="song-title" id="songTitle">Select a Song</h2>
                    <p class="song-artist" id="songArtist">LoFi Vibes</p>
                </div>

                <!-- Visualizer -->
                <div class="visualizer" id="visualizer">
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                </div>

                <!-- Progress Bar -->
                <div class="progress-section">
                    <span class="time" id="currentTime">0:00</span>
                    <div class="progress-bar" id="progressBar">
                        <div class="progress-fill" id="progressFill">
                            <div class="progress-thumb"></div>
                        </div>
                    </div>
                    <span class="time" id="duration">0:00</span>
                </div>

                <!-- Volume -->
                <div class="volume-section">
                    <i class="fas fa-volume-down volume-icon"></i>
                    <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="70">
                    <i class="fas fa-volume-up volume-icon"></i>
                </div>

                <!-- Controls -->
                <div class="controls">
                    <button class="ctrl-btn small" id="shuffleBtn" title="Shuffle">
                        <i class="fas fa-random"></i>
                    </button>
                    <button class="ctrl-btn" id="prevBtn" title="Previous">
                        <i class="fas fa-step-backward"></i>
                    </button>
                    <button class="ctrl-btn play-btn" id="playBtn" title="Play/Pause">
                        <i class="fas fa-play" id="playIcon"></i>
                    </button>
                    <button class="ctrl-btn" id="nextBtn" title="Next">
                        <i class="fas fa-step-forward"></i>
                    </button>
                    <button class="ctrl-btn small" id="repeatBtn" title="Repeat">
                        <i class="fas fa-redo"></i>
                    </button>
                </div>

            </div>

            <!-- Right Panel -->
            <div class="right-panel">

                <!-- Playlist -->
                <div class="panel-card">
                    <div class="panel-header" onclick="togglePlaylist()">
                        <h3><i class="fas fa-list-music"></i> Playlist</h3>
                        <i class="fas fa-chevron-down" id="playlistArrow"></i>
                    </div>
                    <div class="panel-body" id="playlistBody">
                        <div class="playlist" id="playlist"></div>
                    </div>
                </div>

                <!-- Recently Played -->
                <div class="panel-card">
                    <div class="panel-header" onclick="toggleRecent()">
                        <h3><i class="fas fa-history"></i> Recently Played</h3>
                        <i class="fas fa-chevron-down" id="recentArrow"></i>
                    </div>
                    <div class="panel-body" id="recentBody">
                        <div class="playlist" id="recentList">
                            <p class="empty-msg">No recently played songs</p>
                        </div>
                    </div>
                </div>

                <!-- Favorites -->
                <div class="panel-card">
                    <div class="panel-header" onclick="toggleFavorites()">
                        <h3><i class="fas fa-heart"></i> Favorites</h3>
                        <i class="fas fa-chevron-down" id="favoritesArrow"></i>
                    </div>
                    <div class="panel-body" id="favoritesBody">
                        <div class="playlist" id="favoritesList">
                            <p class="empty-msg">No favorite songs yet</p>
                        </div>
                    </div>
                </div>

            </div>

        </div>

    </div>

    <audio id="audio"></audio>
    <script src="script.js"></script>
</body>
</html>
